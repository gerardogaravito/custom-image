<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- SEO -->
    <title>Editor de fotos gratis online · custom-image</title>
    <meta name="description" content="Editor de fotos gratis en el navegador. Curvas RGB, exposición, contraste, recorte estilo iPhone, conversión HEIC y exportación PNG/JPG. Sin registro, sin subir archivos — todo se procesa local en tu navegador." />
    <meta name="keywords" content="editor de fotos, editor de imágenes, online, gratis, navegador, curvas RGB, recortar, HEIC, PNG, JPG, exposición, contraste, sin registro, privado" />
    <meta name="author" content="Gerardo Garavito" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://imagen.garavito.dev/" />

    <!-- Icon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp, Slack, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="custom-image" />
    <meta property="og:url" content="https://imagen.garavito.dev/" />
    <meta property="og:title" content="Editor de fotos gratis online · custom-image" />
    <meta property="og:description" content="Editor de fotos en el navegador. Curvas RGB, ajustes profesionales, recorte tipo iPhone, HEIC. Sin registro, todo local." />
    <meta property="og:image" content="https://imagen.garavito.dev/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="custom-image — editor de fotos gratis" />
    <meta property="og:locale" content="es_MX" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Editor de fotos gratis online · custom-image" />
    <meta name="twitter:description" content="Editor de fotos en el navegador. Curvas RGB, ajustes, recorte iPhone, HEIC. Sin registro, todo local." />
    <meta name="twitter:image" content="https://imagen.garavito.dev/og.png" />

    <!-- Structured data — helps Google + AI agents (ChatGPT, Perplexity, Claude) understand the app -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "custom-image",
      "url": "https://imagen.garavito.dev/",
      "description": "Editor de fotos gratis en el navegador. Curvas RGB, ajustes profesionales, recorte estilo iPhone, conversión HEIC, exportación PNG/JPG. Sin registro ni subida — procesamiento 100% local.",
      "applicationCategory": "MultimediaApplication",
      "applicationSubCategory": "Photo Editor",
      "operatingSystem": "Any (web browser)",
      "browserRequirements": "Requires JavaScript and a modern browser (Chrome, Firefox, Safari, Edge)",
      "inLanguage": "es",
      "isAccessibleForFree": true,
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Curvas de color (master + canales R, G, B) con interpolación monotónica",
        "Ajustes: exposición, brillo, contraste, luces, negros, saturación, ruido",
        "Recorte con aspect ratios estilo iPhone (1:1, 4:5, 3:4, 16:9, etc.)",
        "Conversión automática de imágenes HEIC/HEIF",
        "Exportación PNG y JPG con escala personalizada",
        "Procesamiento 100% local — sin uploads, sin servidor",
        "Undo / redo con Cmd+Z / Cmd+Shift+Z",
        "Atajos de teclado para zoom y herramientas"
      ],
      "creator": {
        "@type": "Person",
        "name": "Gerardo Garavito",
        "url": "https://garavito.dev"
      }
    }
    </script>

    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main id="stage">
      <div id="viewport">
        <canvas id="view" data-zoom-mode="fit"></canvas>
        <div id="crop-overlay" class="crop-overlay" hidden>
          <div class="crop-shade crop-shade--top"></div>
          <div class="crop-shade crop-shade--bottom"></div>
          <div class="crop-shade crop-shade--left"></div>
          <div class="crop-shade crop-shade--right"></div>
          <div class="crop-box" data-handle="move">
            <div class="crop-grid"></div>
            <div class="crop-handle" data-handle="nw"></div>
            <div class="crop-handle" data-handle="n"></div>
            <div class="crop-handle" data-handle="ne"></div>
            <div class="crop-handle" data-handle="e"></div>
            <div class="crop-handle" data-handle="se"></div>
            <div class="crop-handle" data-handle="s"></div>
            <div class="crop-handle" data-handle="sw"></div>
            <div class="crop-handle" data-handle="w"></div>
          </div>
        </div>
      </div>
      <div id="drop" class="drop">
        <label>
          <input type="file" id="file" accept="image/*" hidden />
          <span>arrastra o busca imagen</span>
        </label>
      </div>
    </main>

    <div id="zoom" class="zoom" hidden>
      <button id="zoom-out" title="alejar (-)" aria-label="alejar">−</button>
      <span id="zoom-level">100%</span>
      <button id="zoom-in" title="acercar (+)" aria-label="acercar">+</button>
      <button id="zoom-fit" title="ajustar a pantalla (0)" aria-label="ajustar a pantalla">ajustar</button>
      <button id="zoom-100" title="tamaño real (1)" aria-label="tamaño real">1:1</button>
      <button id="tools-toggle" title="mostrar u ocultar menú (esc)" aria-label="mostrar u ocultar menú">menu</button>
    </div>

    <section id="tools" class="tools" hidden>
      <header class="tools__bar">
        <nav class="tabs">
          <button data-tab="curves" class="tab is-active">curvas</button>
          <button data-tab="adjust" class="tab">ajustes</button>
          <button data-tab="crop" class="tab">recortar</button>
          <button data-tab="export" class="tab">exportar</button>
        </nav>
        <button id="reset" class="ghost">reset</button>
      </header>

      <div class="panel" data-panel="curves">
        <div class="chan">
          <button data-chan="m" class="chan__btn is-active">master</button>
          <button data-chan="r" class="chan__btn">r</button>
          <button data-chan="g" class="chan__btn">g</button>
          <button data-chan="b" class="chan__btn">b</button>
        </div>
        <div class="curve-wrap">
          <canvas id="curve" width="256" height="256"></canvas>
        </div>
        <p class="hint">clic para añadir · arrastra para mover · doble clic para quitar</p>
      </div>

      <div class="panel" data-panel="adjust" hidden>
        <label class="sl"><span>exposición</span><input type="range" min="-100" max="100" value="0" data-adj="exposure"/><i data-val="exposure">0</i></label>
        <label class="sl"><span>brillo</span><input type="range" min="-100" max="100" value="0" data-adj="brightness"/><i data-val="brightness">0</i></label>
        <label class="sl"><span>contraste</span><input type="range" min="-100" max="100" value="0" data-adj="contrast"/><i data-val="contrast">0</i></label>
        <label class="sl"><span>luces</span><input type="range" min="-100" max="100" value="0" data-adj="highlights"/><i data-val="highlights">0</i></label>
        <label class="sl"><span>negros</span><input type="range" min="-100" max="100" value="0" data-adj="blacks"/><i data-val="blacks">0</i></label>
        <label class="sl"><span>saturación</span><input type="range" min="-100" max="100" value="0" data-adj="saturation"/><i data-val="saturation">0</i></label>
        <hr class="sl-divider" />
        <label class="sl"><span>reducir ruido</span><input type="range" min="0" max="100" value="0" data-adj="denoise"/><i data-val="denoise">0</i></label>
        <label class="sl"><span>añadir ruido</span><input type="range" min="0" max="100" value="0" data-adj="noise"/><i data-val="noise">0</i></label>
        <label class="sl"><span>sat. ruido</span><input type="range" min="0" max="100" value="50" data-adj="noiseSat"/><i data-val="noiseSat">50</i></label>
      </div>

      <div class="panel" data-panel="crop" hidden>
        <div class="crop-orient">
          <button class="crop-orient__btn is-active" data-orient="portrait" title="vertical">▯</button>
          <button class="crop-orient__btn" data-orient="landscape" title="horizontal">▭</button>
        </div>
        <div class="aspect-grid">
          <button class="aspect-btn is-active" data-aspect="free">libre</button>
          <button class="aspect-btn" data-aspect="original">original</button>
          <button class="aspect-btn" data-aspect="1:1">1:1</button>
          <button class="aspect-btn" data-aspect="9:16">9:16</button>
          <button class="aspect-btn" data-aspect="8:10">8:10</button>
          <button class="aspect-btn" data-aspect="5:7">5:7</button>
          <button class="aspect-btn" data-aspect="4:5">4:5</button>
          <button class="aspect-btn" data-aspect="3:4">3:4</button>
          <button class="aspect-btn" data-aspect="3:5">3:5</button>
          <button class="aspect-btn" data-aspect="2:3">2:3</button>
        </div>
        <div class="row">
          <button id="crop-apply" class="go">aplicar</button>
          <button id="crop-reset" class="ghost-bordered">restaurar</button>
        </div>
      </div>

      <div class="panel" data-panel="export" hidden>
        <div class="row">
          <label class="sel"><span>formato</span>
            <select id="fmt"><option value="png">png</option><option value="jpeg">jpg</option></select>
          </label>
          <label class="sel"><span>escala</span>
            <select id="scale">
              <option value="0.3">0.3x</option>
              <option value="1" selected>1x</option>
              <option value="2">2x</option>
              <option value="4">4x</option>
            </select>
          </label>
        </div>
        <label class="sl" id="qwrap"><span>calidad</span><input type="range" min="50" max="100" value="92" id="q"/><i id="qv">92</i></label>
        <button id="download" class="go">descargar</button>
      </div>
    </section>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
